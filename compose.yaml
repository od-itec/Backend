services:
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla-itec
    ports:
      - "9042:9042"
      - "7000:7000"
      - "7001:7001"
      - "9160:9160"
      - "9180:9180"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 750M --developer-mode 1
    healthcheck:
      test: ["CMD-SHELL", "nodetool status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - scylla_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres-itec
    environment:
      POSTGRES_USER: itec
      POSTGRES_PASSWORD: itec_secret
      POSTGRES_DB: itec_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itec -d itec_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - scylla_network

  backend:
    build: .
    depends_on:
      scylla:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://itec:itec_secret@postgres:5432/itec_auth
      SCYLLA_HOSTS: scylla
      SCYLLA_CONNECT_RETRIES: 20
      SCYLLA_RETRY_DELAY_SECONDS: 3
      DIND_IMAGE: itec-dind:latest
    ports:
      - "8000:8000"
      - "11000-11099:11000-11099"   # user app preview ports
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - scylla_network

  # Build the custom DinD image once
  dind-builder:
    build:
      context: ./docker
      dockerfile: Dockerfile.dind
    image: itec-dind:latest
    entrypoint: ["echo", "DinD image built successfully"]
    profiles:
      - build

networks:
  scylla_network:
    driver: bridge

volumes:
  scylla_data:
  postgres_data:
